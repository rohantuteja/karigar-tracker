<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Karigar Production Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#F7F5F0;--sur:#fff;--bdr:#E2DDD6;--bdrs:#C8C2B8;--tx:#1A1814;--t2:#6B6560;--t3:#9E9890;--gr:#2D6A4F;--grl:#E8F4EE;--grt:#1A4A33;--rd:#C0392B;--rdl:#FDEDEB;--r:10px;--rl:14px;--sh:0 1px 3px rgba(0,0,0,.06);--shm:0 4px 16px rgba(0,0,0,.12)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:15px}
.hdr{background:var(--sur);border-bottom:1px solid var(--bdr);padding:0 22px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100;box-shadow:var(--sh)}
.brand{display:flex;align-items:center;gap:10px}
.bico{width:32px;height:32px;background:var(--gr);border-radius:8px;display:flex;align-items:center;justify-content:center}
.bico svg{width:17px;height:17px;fill:#fff}
.bnm{font-size:15px;font-weight:600}.bsb{font-size:11px;color:var(--t2)}
.conn{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--t2)}
.dot{width:7px;height:7px;border-radius:50%;background:#ccc;transition:background .3s}
.dot.ok{background:#27AE60}.dot.err{background:var(--rd)}
.wrap{max-width:840px;margin:0 auto;padding:22px 16px 80px}
.tabs{display:flex;gap:2px;background:var(--sur);border:1px solid var(--bdr);border-radius:var(--rl);padding:4px;margin-bottom:20px;box-shadow:var(--sh)}
.tb{flex:1;padding:9px 6px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;border:none;border-radius:9px;background:transparent;color:var(--t2);cursor:pointer;transition:all .15s;text-align:center}
.tb:hover{color:var(--tx);background:var(--bg)}.tb.active{background:var(--gr);color:#fff}
.sec{display:none}.sec.active{display:block}
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--rl);padding:20px;margin-bottom:14px;box-shadow:var(--sh)}
.ct{font-size:14px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:7px}
.ct svg{width:14px;height:14px;fill:var(--gr)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.field{display:flex;flex-direction:column;gap:4px}
.lbl{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.06em}
select,input[type=date],input[type=text],input[type=number]{height:40px;padding:0 12px;font-size:14px;font-family:'DM Sans',sans-serif;border:1px solid var(--bdrs);border-radius:var(--r);background:var(--bg);color:var(--tx);width:100%;outline:none;transition:border-color .15s,box-shadow .15s}
select:focus,input:focus{border-color:var(--gr);box-shadow:0 0 0 3px rgba(45,106,79,.12);background:#fff}
.shd{display:grid;grid-template-columns:1fr 88px 34px;gap:8px;margin-bottom:5px}
.shd span{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.05em}
.sr{display:grid;grid-template-columns:1fr 88px 34px;gap:8px;margin-bottom:8px;align-items:center}
.sr input[type=number]{text-align:center}
.btn{height:40px;padding:0 16px;font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;border-radius:var(--r);cursor:pointer;border:1px solid var(--bdrs);background:var(--sur);color:var(--tx);transition:all .12s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn:hover{background:var(--bg)}.btn.pr{background:var(--gr);color:#fff;border-color:transparent}.btn.pr:hover{background:#235C42}.btn.pr:disabled{opacity:.5;cursor:not-allowed}
.btn.dr{color:var(--rd);border-color:#F5C6C2}.btn.dr:hover{background:var(--rdl)}
.btn.sm{height:32px;padding:0 12px;font-size:13px}.btn.xs{height:27px;padding:0 9px;font-size:12px}
.ico{width:34px;height:34px;padding:0;display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--bdr);border-radius:var(--r);background:transparent;cursor:pointer;color:var(--t2);font-size:18px;transition:all .12s}
.ico:hover{background:var(--rdl);color:var(--rd);border-color:#F5C6C2}
.addb{display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;color:var(--gr);font-weight:500;font-family:'DM Sans',sans-serif;border:1.5px dashed #A8D5BB;background:var(--grl);border-radius:var(--r);padding:9px;cursor:pointer;width:100%;margin:4px 0 16px;transition:all .12s}
.addb:hover{background:#D6EDE2}
.mg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.mc{background:var(--bg);border:1px solid var(--bdr);border-radius:var(--r);padding:14px}
.mv{font-size:26px;font-weight:600;letter-spacing:-.5px}.ml{font-size:12px;color:var(--t2);margin-top:2px}
.br{margin-bottom:13px}.bi{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.bn{font-weight:500}.bv{color:var(--t2)}
.bt{height:7px;background:var(--bg);border-radius:4px;overflow:hidden;border:1px solid var(--bdr)}
.bf{height:100%;background:var(--gr);border-radius:4px;transition:width .5s}
.tag{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;background:var(--grl);color:var(--grt)}
.li{display:flex;justify-content:space-between;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--bdr)}
.li:last-child{border-bottom:none}
.ll{display:flex;gap:10px;align-items:flex-start}
.av{width:34px;height:34px;border-radius:50%;background:var(--grl);color:var(--grt);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.ln{font-size:14px;font-weight:500;margin-bottom:4px}.lt{display:flex;flex-wrap:wrap;gap:4px}
.lq{font-size:18px;font-weight:600}.la{display:flex;align-items:center;gap:7px}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.ov.open{display:flex}
.mo{background:var(--sur);border-radius:var(--rl);width:100%;max-width:440px;box-shadow:var(--shm)}
.moh{padding:16px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between}
.mot{font-size:15px;font-weight:600}.moc{background:none;border:none;font-size:22px;cursor:pointer;color:var(--t2);line-height:1}
.mob{padding:20px}.mof{padding:12px 20px;border-top:1px solid var(--bdr);display:flex;justify-content:flex-end;gap:10px}
.er{display:grid;grid-template-columns:1fr 88px 34px;gap:8px;margin-bottom:8px;align-items:center}
.hdh{display:flex;justify-content:space-between;align-items:center;margin:18px 0 7px}
.hdl{font-size:12px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.06em}
.hdt{font-size:13px;font-weight:600;color:var(--gr)}
.mli{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--bdr);font-size:14px}
.mli:last-child{border-bottom:none}
.iadd{display:flex;gap:8px;margin-top:10px}.iadd input{flex:1}
.toast{position:fixed;bottom:22px;right:22px;padding:11px 16px;border-radius:var(--r);font-size:14px;font-weight:500;box-shadow:var(--shm);transform:translateY(80px);opacity:0;transition:all .25s cubic-bezier(.34,1.56,.64,1);z-index:999;max-width:300px}
.toast.show{transform:translateY(0);opacity:1}.toast.success{background:var(--gr);color:#fff}.toast.error{background:var(--rd);color:#fff}
.sp{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
.sp.dk{border-color:rgba(0,0,0,.12);border-top-color:var(--gr);width:18px;height:18px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:26px 14px;color:var(--t2);font-size:14px}
@media(max-width:540px){.frow{grid-template-columns:1fr}.mg{grid-template-columns:1fr 1fr}.wrap{padding:14px 12px 80px}.tb{font-size:11px;padding:8px 3px}}
</style>
</head>
<body>
<div class="hdr">
  <div class="brand">
    <div class="bico"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l7.59-7.59L21 8l-9 9z"/></svg></div>
    <div><div class="bnm">Production Tracker</div><div class="bsb">Karigar-Level Monitoring</div></div>
  </div>
  <div class="conn"><div class="dot" id="dot"></div><span id="ctxt">Connecting...</span></div>
</div>
<div class="wrap">
  <div class="tabs">
    <button class="tb active" onclick="goTab('entry')">Daily Entry</button>
    <button class="tb" onclick="goTab('dashboard')">Dashboard</button>
    <button class="tb" onclick="goTab('history')">History</button>
    <button class="tb" onclick="goTab('manage')">Manage</button>
  </div>
  <!-- ENTRY -->
  <div id="sec-entry" class="sec active">
    <div class="card">
      <div class="ct"><svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5C3.89 3 3 3.9 3 5v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>Log Production Entry</div>
      <div class="frow">
        <div class="field"><label class="lbl">Date</label><input type="date" id="e-date"/></div>
        <div class="field"><label class="lbl">Karigar</label><select id="e-kar"><option value="">Select karigar...</option></select></div>
      </div>
      <div class="shd"><span>SKU / Style</span><span style="text-align:center">Qty</span><span></span></div>
      <div id="sku-rows"></div>
      <button class="addb" onclick="addSR()">+ Add SKU</button>
      <button class="btn pr" style="width:100%" id="save-btn" onclick="saveEntry()">Save Entry to Google Sheet</button>
    </div>
    <div class="card">
      <div class="ct"><svg viewBox="0 0 24 24"><path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z"/></svg>Today's Entries&nbsp;<span id="tlbl" style="font-weight:400;color:var(--t2);font-size:13px"></span></div>
      <div id="today-list"><div class="empty">No entries yet.</div></div>
    </div>
  </div>
  <!-- DASHBOARD -->
  <div id="sec-dashboard" class="sec">
    <div class="card">
      <div style="display:flex;gap:10px;align-items:flex-end;margin-bottom:16px">
        <div class="field" style="flex:1"><label class="lbl">Date</label><input type="date" id="dash-date"/></div>
        <button class="btn sm" onclick="dashToday()">Today</button>
        <button class="btn sm pr" onclick="loadDash()">Refresh</button>
      </div>
      <div class="mg" id="dash-m">
        <div class="mc"><div class="mv">-</div><div class="ml">Total pieces</div></div>
        <div class="mc"><div class="mv">-</div><div class="ml">Karigars active</div></div>
        <div class="mc"><div class="mv">-</div><div class="ml">SKUs worked</div></div>
      </div>
    </div>
    <div class="card"><div class="ct"><svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 3-1.34 3-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3z"/></svg>Karigar-wise output</div><div id="dash-k"><div class="empty">Click Refresh.</div></div></div>
    <div class="card"><div class="ct"><svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>SKU-wise totals</div><div id="dash-s"><div class="empty">Click Refresh.</div></div></div>
  </div>
  <!-- HISTORY -->
  <div id="sec-history" class="sec">
    <div class="card" style="padding:16px 20px">
      <div class="frow">
        <div class="field"><label class="lbl">From</label><input type="date" id="h-from"/></div>
        <div class="field"><label class="lbl">To</label><input type="date" id="h-to"/></div>
      </div>
      <button class="btn pr sm" onclick="loadHist()">Search</button>
    </div>
    <div id="hist-list"></div>
  </div>
  <!-- MANAGE -->
  <div id="sec-manage" class="sec">
    <div class="card">
      <div class="ct"><svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 3-1.34 3-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3z"/></svg>Karigars</div>
      <div id="k-list"></div>
      <div class="iadd"><input type="text" id="new-k" placeholder="Karigar name..."/><button class="btn pr" onclick="addK()">Add</button></div>
    </div>
    <div class="card">
      <div class="ct"><svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>SKUs / Styles</div>
      <div id="s-list"></div>
      <div class="iadd"><input type="text" id="new-s" placeholder="SKU / Style name..."/><button class="btn pr" onclick="addS()">Add</button></div>
    </div>
    <div class="card" style="border-color:#F5C6C2">
      <div class="ct" style="color:var(--rd)"><svg viewBox="0 0 24 24" style="fill:var(--rd)"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>Danger Zone</div>
      <button class="btn xs dr" onclick="clearLocal()">Reset local settings (karigar and SKU lists only)</button>
    </div>
  </div>
</div>
<!-- EDIT MODAL -->
<div class="ov" id="ov" onclick="ovClick(event)">
  <div class="mo">
    <div class="moh"><div class="mot">Edit Entry</div><button class="moc" onclick="closeModal()">x</button></div>
    <div class="mob"><div id="einfo" style="font-size:13px;color:var(--t2);margin-bottom:14px"></div><div id="erows"></div></div>
    <div class="mof"><button class="btn sm" onclick="closeModal()">Cancel</button><button class="btn sm pr" id="esave" onclick="saveEdits()">Save Changes</button></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var SURL='https://script.google.com/macros/s/AKfycbz35nz3yhaxGdJI_hkOTRZrS5D7dVkTKMLLMwiJwAfnAlEjLlnP8l3tIRzjx-L6ireJXw/exec';
var karigars=JSON.parse(localStorage.getItem('pt-k')||'["Karigar A","Karigar B","Karigar C"]');
var skus=JSON.parse(localStorage.getItem('pt-s')||'["SKU A","SKU B","SKU C"]');
var srN=0,editEnt=null,_cbn=0,_tt;

function api(p,cb){
  var n='_cb'+(++_cbn); p.callback=n;
  var qs=Object.keys(p).map(function(k){var v=p[k];if(typeof v==='object')v=JSON.stringify(v);return encodeURIComponent(k)+'='+encodeURIComponent(v);}).join('&');
  var s=document.createElement('script'); s.src=SURL+'?'+qs;
  window[n]=function(d){delete window[n];if(s.parentNode)document.body.removeChild(s);cb(null,d);};
  s.onerror=function(){delete window[n];if(s.parentNode)document.body.removeChild(s);cb(new Error('fail'));};
  document.body.appendChild(s);
}

function td(){return new Date().toISOString().slice(0,10);}
function ini(n){return (n||'').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase()||'?';}
function fmt(s){if(!s)return'';var d=new Date(s+'T00:00:00');return d.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short',year:'numeric'});}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function toast(msg,type){
  type=type||'success';
  var el=document.getElementById('toast');
  el.textContent=msg;el.className='toast '+type+' show';
  clearTimeout(_tt);_tt=setTimeout(function(){el.className='toast '+type;},3000);
}

function goTab(t){
  var nm=['entry','dashboard','history','manage'];
  document.querySelectorAll('.tb').forEach(function(b,i){b.classList.toggle('active',nm[i]===t);});
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('active');});
  document.getElementById('sec-'+t).classList.add('active');
  if(t==='dashboard')loadDash();
  if(t==='history')loadHist();
  if(t==='manage')renderManage();
}

function init(){
  var t=td();
  document.getElementById('e-date').value=t;
  document.getElementById('dash-date').value=t;
  document.getElementById('tlbl').textContent=fmt(t);
  var f=new Date();f.setDate(f.getDate()-30);
  document.getElementById('h-from').value=f.toISOString().slice(0,10);
  document.getElementById('h-to').value=t;
  fillKDrop();addSR();ping();loadToday();
  document.getElementById('e-date').addEventListener('change',function(){
    document.getElementById('tlbl').textContent=fmt(this.value);loadToday();
  });
}

function ping(){
  api({action:'ping'},function(err,r){
    var dot=document.getElementById('dot'),txt=document.getElementById('ctxt');
    if(!err&&r&&r.status==='ok'){dot.className='dot ok';txt.textContent='Connected to Sheet';}
    else{dot.className='dot err';txt.textContent='Connection error';}
  });
}

function fillKDrop(){
  var sel=document.getElementById('e-kar'),cur=sel.value;
  sel.innerHTML='<option value="">Select karigar...</option>'+
    karigars.map(function(k){return '<option value="'+esc(k)+'"'+(k===cur?' selected':'')+'>'+esc(k)+'</option>';}).join('');
}

function addSR(sv,qv){
  sv=sv||'';qv=qv||'';srN++;
  var id='sr'+srN,d=document.createElement('div');
  d.className='sr';d.id=id;
  d.innerHTML='<select class="ss"><option value="">Select SKU...</option>'+
    skus.map(function(s){return '<option value="'+esc(s)+'"'+(s===sv?' selected':'')+'>'+esc(s)+'</option>';}).join('')+
    '</select><input type="number" min="1" max="9999" placeholder="0" value="'+qv+'" class="sq" style="text-align:center"/>'+
    '<button class="ico" onclick="document.getElementById(\''+id+'\').remove()">x</button>';
  document.getElementById('sku-rows').appendChild(d);
}

function saveEntry(){
  var date=document.getElementById('e-date').value,karigar=document.getElementById('e-kar').value;
  if(!date||!karigar){toast('Select date and karigar','error');return;}
  var items=[];
  document.querySelectorAll('.sr').forEach(function(r){
    var s=r.querySelector('.ss').value,q=parseInt(r.querySelector('.sq').value);
    if(s&&q>0)items.push({sku:s,qty:q});
  });
  if(!items.length){toast('Add at least one SKU with quantity','error');return;}
  var btn=document.getElementById('save-btn');
  btn.innerHTML='<span class="sp"></span> Saving...';btn.disabled=true;
  api({action:'addEntry',data:{date:date,karigar:karigar,items:items}},function(err,r){
    btn.innerHTML='Save Entry to Google Sheet';btn.disabled=false;
    if(!err&&r&&r.status==='ok'){
      toast('Entry saved');document.getElementById('sku-rows').innerHTML='';srN=0;addSR();loadToday();
    }else{toast('Error: '+(r&&r.message?r.message:'Could not save'),'error');}
  });
}

function loadToday(){
  var date=document.getElementById('e-date').value||td();
  api({action:'getByDate',date:date},function(err,r){
    renderList('today-list',r&&r.entries?r.entries:[],date,true);
  });
}

function renderList(elId,entries,date,acts){
  var el=document.getElementById(elId);
  if(!entries||!entries.length){el.innerHTML='<div class="empty">No entries for this date.</div>';return;}
  el.innerHTML=entries.map(function(e){
    var tot=0;e.items.forEach(function(i){tot+=i.qty;});
    var tags=e.items.map(function(i){return '<span class="tag">'+esc(i.sku)+': '+i.qty+'</span>';}).join('');
    var right=acts
      ?'<div class="la"><div class="lq">'+tot+'</div>'+
        '<button class="btn xs" onclick=\'openEdit('+JSON.stringify(e)+')\'>Edit</button>'+
        '<button class="btn xs dr" onclick="delEnt(\''+esc(date)+'\',\''+esc(e.karigar)+'\')">Delete</button></div>'
      :'<div class="lq">'+tot+'</div>';
    return '<div class="li"><div class="ll"><div class="av">'+ini(e.karigar)+'</div>'+
      '<div><div class="ln">'+esc(e.karigar)+'</div><div class="lt">'+tags+'</div></div></div>'+right+'</div>';
  }).join('');
}

function openEdit(entry){
  editEnt=JSON.parse(JSON.stringify(entry));
  document.getElementById('einfo').innerHTML='<strong>'+esc(entry.karigar)+'</strong> - '+fmt(entry.date);
  var rows=document.getElementById('erows');rows.innerHTML='';
  entry.items.forEach(function(item,idx){
    var d=document.createElement('div');d.className='er';
    d.innerHTML='<div style="font-size:14px;font-weight:500">'+esc(item.sku)+'</div>'+
      '<input type="number" min="0" max="9999" value="'+item.qty+'" style="text-align:center" data-idx="'+idx+'" class="eq"/>'+
      '<button class="ico" onclick="delRow(\''+item.rowId+'\',this)">x</button>';
    rows.appendChild(d);
  });
  document.getElementById('ov').classList.add('open');
}

function closeModal(){document.getElementById('ov').classList.remove('open');editEnt=null;}
function ovClick(e){if(e.target===document.getElementById('ov'))closeModal();}

function delRow(rowId,btn){
  btn.disabled=true;btn.textContent='...';
  api({action:'deleteRow',data:{rowId:rowId}},function(err,r){
    if(!err&&r&&r.status==='ok'){btn.closest('.er').remove();toast('Row removed');loadToday();refreshVisible();}
    else{toast('Error','error');btn.disabled=false;btn.textContent='x';}
  });
}

function saveEdits(){
  var inputs=document.querySelectorAll('.eq'),btn=document.getElementById('esave');
  btn.innerHTML='<span class="sp"></span>';btn.disabled=true;
  var left=inputs.length,bad=false;
  if(!left){closeModal();btn.innerHTML='Save Changes';btn.disabled=false;return;}
  inputs.forEach(function(inp){
    var idx=parseInt(inp.dataset.idx),qty=parseInt(inp.value)||0,rid=editEnt.items[idx].rowId;
    api({action:'updateRow',data:{rowId:rid,qty:qty}},function(err,r){
      if(err||!r||r.status!=='ok')bad=true;
      if(--left===0){
        btn.innerHTML='Save Changes';btn.disabled=false;
        if(bad)toast('Some rows failed','error');
        else{toast('Saved');closeModal();loadToday();refreshVisible();}
      }
    });
  });
}

function delEnt(date,karigar){
  if(!confirm('Delete ALL entries for '+karigar+' on '+fmt(date)+'?'))return;
  api({action:'deleteEntry',data:{date:date,karigar:karigar}},function(err,r){
    if(!err&&r&&r.status==='ok'){toast('Deleted');loadToday();refreshVisible();}
    else toast('Error deleting','error');
  });
}

function dashToday(){document.getElementById('dash-date').value=td();loadDash();}

function loadDash(){
  var dateEl=document.getElementById('dash-date');
  if(!dateEl.value)dateEl.value=td();
  var date=dateEl.value;
  document.getElementById('dash-m').innerHTML='<div class="mc"><div class="mv"><span class="sp dk"></span></div><div class="ml">Loading...</div></div><div class="mc"></div><div class="mc"></div>';
  document.getElementById('dash-k').innerHTML='';
  document.getElementById('dash-s').innerHTML='';
  api({action:'getByDate',date:date},function(err,r){
    var entries=(r&&r.entries)?r.entries:[];
    var total=0;entries.forEach(function(e){e.items.forEach(function(i){total+=i.qty;});});
    var sset={};entries.forEach(function(e){e.items.forEach(function(i){sset[i.sku]=1;});});
    document.getElementById('dash-m').innerHTML=
      '<div class="mc"><div class="mv">'+total+'</div><div class="ml">Total pieces</div></div>'+
      '<div class="mc"><div class="mv">'+entries.length+'</div><div class="ml">Karigars active</div></div>'+
      '<div class="mc"><div class="mv">'+Object.keys(sset).length+'</div><div class="ml">SKUs worked</div></div>';
    var kt={};
    entries.forEach(function(e){var t=0;e.items.forEach(function(i){t+=i.qty;});kt[e.karigar]=(kt[e.karigar]||0)+t;});
    var kk=Object.keys(kt).sort(function(a,b){return kt[b]-kt[a];});
    var maxk=1;kk.forEach(function(k){if(kt[k]>maxk)maxk=kt[k];});
    document.getElementById('dash-k').innerHTML=kk.length
      ?kk.map(function(k){return '<div class="br"><div class="bi"><span class="bn">'+esc(k)+'</span><span class="bv">'+kt[k]+' pcs</span></div><div class="bt"><div class="bf" style="width:'+Math.round(kt[k]/maxk*100)+'%"></div></div></div>';}).join('')
      :'<div class="empty">No data for this date.</div>';
    var st={};entries.forEach(function(e){e.items.forEach(function(i){st[i.sku]=(st[i.sku]||0)+i.qty;});});
    var sk=Object.keys(st).sort(function(a,b){return st[b]-st[a];});
    var maxs=1;sk.forEach(function(k){if(st[k]>maxs)maxs=st[k];});
    document.getElementById('dash-s').innerHTML=sk.length
      ?sk.map(function(k){return '<div class="br"><div class="bi"><span class="bn"><span class="tag">'+esc(k)+'</span></span><span class="bv">'+st[k]+' pcs</span></div><div class="bt"><div class="bf" style="width:'+Math.round(st[k]/maxs*100)+'%"></div></div></div>';}).join('')
      :'<div class="empty">No SKU data.</div>';
  });
}

function loadHist(){
  var from=document.getElementById('h-from').value,to=document.getElementById('h-to').value;
  if(!from||!to){toast('Select date range','error');return;}
  var el=document.getElementById('hist-list');
  el.innerHTML='<div class="empty">Loading...</div>';
  api({action:'getRange',from:from,to:to},function(err,r){
    if(err||!r||!r.entries||!r.entries.length){el.innerHTML='<div class="empty">No records found for this range.</div>';return;}
    var grp={};
    r.entries.forEach(function(e){(grp[e.date]=grp[e.date]||[]).push(e);});
    var dates=Object.keys(grp).sort(function(a,b){return b.localeCompare(a);});
    el.innerHTML=dates.map(function(date){
      var dayE=grp[date],dayT=0;
      dayE.forEach(function(e){e.items.forEach(function(i){dayT+=i.qty;});});
      var rows=dayE.map(function(e){
        var tot=0;e.items.forEach(function(i){tot+=i.qty;});
        var tags=e.items.map(function(i){return '<span class="tag">'+esc(i.sku)+': '+i.qty+'</span>';}).join('');
        return '<div class="li"><div class="ll"><div class="av">'+ini(e.karigar)+'</div>'+
          '<div><div class="ln">'+esc(e.karigar)+'</div><div class="lt">'+tags+'</div></div></div>'+
          '<div class="la"><div class="lq">'+tot+'</div>'+
          '<button class="btn xs" onclick=\'openEdit('+JSON.stringify(e)+')\'>Edit</button>'+
          '<button class="btn xs dr" onclick="delEnt(\''+esc(date)+'\',\''+esc(e.karigar)+'\')">Delete</button>'+
          '</div></div>';
      }).join('');
      return '<div class="hdh"><div class="hdl">'+fmt(date)+'</div><div class="hdt">'+dayT+' pcs</div></div>'+
        '<div class="card" style="padding:0 16px">'+rows+'</div>';
    }).join('');
  });
}

function refreshVisible(){
  if(document.getElementById('sec-dashboard').classList.contains('active'))loadDash();
  if(document.getElementById('sec-history').classList.contains('active'))loadHist();
}

function renderManage(){
  document.getElementById('k-list').innerHTML=karigars.length
    ?karigars.map(function(k,i){return '<div class="mli"><div style="display:flex;align-items:center;gap:9px"><div class="av" style="width:28px;height:28px;font-size:10px">'+ini(k)+'</div>'+esc(k)+'</div><button class="btn xs dr" onclick="removeK('+i+')">Remove</button></div>';}).join('')
    :'<div style="font-size:13px;color:var(--t3);padding:8px 0">None yet.</div>';
  document.getElementById('s-list').innerHTML=skus.length
    ?skus.map(function(s,i){return '<div class="mli"><span class="tag">'+esc(s)+'</span><button class="btn xs dr" onclick="removeS('+i+')">Remove</button></div>';}).join('')
    :'<div style="font-size:13px;color:var(--t3);padding:8px 0">None yet.</div>';
}

function addK(){
  var n=document.getElementById('new-k').value.trim();if(!n)return;
  if(karigars.indexOf(n)>-1){toast('Already exists','error');return;}
  karigars.push(n);localStorage.setItem('pt-k',JSON.stringify(karigars));
  document.getElementById('new-k').value='';fillKDrop();renderManage();toast(n+' added');
}
function removeK(i){karigars.splice(i,1);localStorage.setItem('pt-k',JSON.stringify(karigars));fillKDrop();renderManage();}
function addS(){
  var n=document.getElementById('new-s').value.trim();if(!n)return;
  if(skus.indexOf(n)>-1){toast('Already exists','error');return;}
  skus.push(n);localStorage.setItem('pt-s',JSON.stringify(skus));
  document.getElementById('new-s').value='';renderManage();toast(n+' added');
}
function removeS(i){skus.splice(i,1);localStorage.setItem('pt-s',JSON.stringify(skus));renderManage();}
function clearLocal(){if(!confirm('Reset lists? Sheet data will NOT be deleted.'))return;localStorage.clear();location.reload();}

init();
</script>
